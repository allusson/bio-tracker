<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BioIntelliSense — Location Intelligence Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', 'Segoe UI', sans-serif; background: #f3f4f6; }
  button { font-family: inherit; cursor: pointer; transition: all .15s; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  /* ── Layout ── */
  #app  { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #hdr  { height: 56px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; gap: 14px; }
  #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #sb   { width: 272px; flex-shrink: 0; border-right: 1px solid #e5e7eb; background: #fff; padding: 14px; overflow-y: auto; }
  #viz  { flex: 1; padding: 12px; min-width: 0; overflow: hidden; background: #f9fafb; display: flex; flex-direction: column; gap: 8px; }
  #ftr  { height: 58px; border-top: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; gap: 8px; overflow-x: auto; }

  /* ── Tabs ── */
  .tab { padding: 5px 11px 3px; border-radius: 6px; border: none; background: transparent; text-align: left; flex-shrink: 0; border-bottom: 2px solid transparent; }
  .tab.active { border-bottom: 2px solid #2563eb; }
  .tab .tname { font-size: 12px; font-weight: 500; white-space: nowrap; color: #6b7280; }
  .tab.active .tname { color: #111827; }
  .tab .tsub { font-size: 9px; color: #9ca3af; white-space: nowrap; }

  /* ── Play button ── */
  #playbtn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #6b7280; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── Speed buttons ── */
  .spd-btn { padding: 4px 8px; border-radius: 5px; border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280; font-size: 11px; font-weight: 500; }
  .spd-btn.active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }

  /* ── Zone badge ── */
  #zbadge { border-radius: 12px; padding: 11px; margin-bottom: 14px; }
  #zb-lbl { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  #zb-name { font-size: 21px; font-weight: 500; margin-bottom: 2px; line-height: 1.1; }
  #zb-desc { font-size: 11px; color: #6b7280; }

  /* ── Sidebar cards ── */
  .sc-lbl { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #9ca3af; margin-bottom: 7px; }
  .sc-card { background: #f9fafb; border-radius: 8px; padding: 10px; margin-bottom: 12px; border: 1px solid #e5e7eb; font-size: 12px; color: #4b5563; line-height: 1.6; }
  .sc-card-title { font-size: 13px; font-weight: 500; color: #111827; margin-bottom: 3px; }

  /* ── Mode toggle buttons ── */
  .mode-btn { flex: 1; padding: 8px 6px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280; }
  .mode-btn.raw-active   { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
  .mode-btn.smooth-active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }

  /* ── Zone pills ── */
  .zp { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; flex-shrink: 0; transition: all .25s; background: #f9fafb; color: #9ca3af; border: 1px solid #e5e7eb; }

  /* ── Zone list (stage 3) ── */
  .szrow { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; margin-bottom: 4px; transition: all .2s; border: 1px solid transparent; }
  .szdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .szname { font-size: 12px; font-weight: 500; color: #111827; }
  .szdesc { font-size: 10px; color: #9ca3af; }

  /* ── MDS layout ── */
  #mds-wrap { width: 100%; flex: 1; min-height: 0; display: none; gap: 10px; align-items: stretch; }

  /* ── Floor plan wrap ── */
  #fp-wrap { flex: 1; min-height: 0; }

  /* ── Scrubber ── */
  #scrubber-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  #scrubber { flex: 1; accent-color: #2563eb; cursor: pointer; height: 4px; }
  #scrubber-time { font-size: 10px; color: #9ca3af; width: 30px; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  /* ── Tooltip ── */
  #tooltip { position: fixed; z-index: 999; background: #0c1a28; border: 1px solid #1c3855; border-radius: 8px; padding: 8px 10px; pointer-events: none; display: none; min-width: 160px; }
  #tooltip .tt-title { font-size: 11px; font-weight: 600; color: #c8ddf0; margin-bottom: 5px; }
  #tooltip .tt-row { display: flex; justify-content: space-between; gap: 14px; font-size: 11px; line-height: 1.7; }

  /* ── Floor plan toggle ── */
  .fp-toggle { width: 100%; padding: 7px 10px; border-radius: 8px; border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280; font-size: 12px; font-weight: 500; margin-bottom: 12px; text-align: left; }
  .fp-toggle.on { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }

  /* ── Stage 2 legend swatch ── */
  .leg-swatch { display: inline-block; width: 18px; height: 3px; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <div style="flex-shrink:0">
      <div style="font-size:14px;font-weight:500;color:#111827;line-height:1.2">BioIntelliSense</div>
      <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;line-height:1.2">Location intelligence demo</div>
    </div>
    <div style="width:1px;height:26px;background:#e5e7eb;flex-shrink:0"></div>
    <div id="tabs" style="display:flex;gap:2px;flex:1;overflow:hidden"></div>
    <div style="display:flex;gap:2px;flex-shrink:0">
      <button class="spd-btn" id="spd05" onclick="setSpeed(0.5)">0.5×</button>
      <button class="spd-btn active" id="spd1" onclick="setSpeed(1)">1×</button>
      <button class="spd-btn" id="spd2" onclick="setSpeed(2)">2×</button>
    </div>
    <button id="playbtn" onclick="togglePlay()">⏸</button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sb">
      <div id="zbadge">
        <div id="zb-lbl">Currently in</div>
        <div id="zb-name"></div>
        <div id="zb-desc"></div>
      </div>
      <div id="sc"></div>
    </div>

    <!-- Visualization -->
    <div id="viz">

      <!-- Signal / trajectory view (stages 1 & 2) -->
      <div id="fp-wrap">
        <svg id="fp" viewBox="0 0 760 440" style="width:100%;height:100%;display:block"
             preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <!-- MDS view (stage 3) -->
      <div id="mds-wrap">
        <div style="flex:0 0 40%;display:flex;flex-direction:column">
          <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;flex-shrink:0">Device trajectory</div>
          <div style="flex:1;min-height:0">
            <svg id="mfp" viewBox="0 0 760 440" style="width:100%;height:100%;display:block"
                 preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;padding:0 4px">
          <span style="writing-mode:vertical-lr;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;font-weight:500">MDS derives</span>
          <span style="font-size:16px;color:#9ca3af">→</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;flex-shrink:0">
            <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase">MDS pseudo-map · data-derived</div>
            <div style="display:flex;align-items:center;gap:8px">
              <div style="font-size:9px;color:#9ca3af;font-style:italic">topological, not metric</div>
              <button onclick="rebuildMDS()" style="font-size:9px;padding:3px 8px;border-radius:5px;border:1px solid #1c3855;background:#0a1929;color:#5b9acc;font-weight:500">↺ Rebuild</button>
            </div>
          </div>
          <div style="flex:1;min-height:0">
            <svg id="mg" viewBox="0 0 560 360" style="width:100%;height:100%;display:block"
                 preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
      </div>

      <!-- Timeline scrubber -->
      <div id="scrubber-wrap">
        <span style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;flex-shrink:0">Timeline</span>
        <input type="range" id="scrubber" min="0" max="1000" value="0" step="1"/>
        <span id="scrubber-time">0.0s</span>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div id="ftr">
    <div style="font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;flex-shrink:0">Zones</div>
    <div id="zpills" style="display:flex;gap:6px"></div>
    <div style="width:1px;height:18px;background:#e5e7eb;flex-shrink:0"></div>
    <div id="bmark" style="font-size:11px;color:#6b7280;flex-shrink:0"></div>
    <div style="margin-left:auto;font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;flex-shrink:0" id="sind">Stage 1 / 3</div>
  </div>

</div><!-- #app -->

<!-- Floating tooltip -->
<div id="tooltip"><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// Data
// ════════════════════════════════════════════════════════════════════════════

const FW=760, FH=440, HY=188, HH=64, HB=252, CYCLE=24000;
const ZCOL = ['#4a7fe8','#22c47a','#e89810','#8a6edc','#e04e4e','#0ec8d8'];
const PATH_SAMPLES = 280;

const ROOMS = [
  {id:'r101',  label:'Room 101',        x:0,   y:0,   w:162, h:HY    },
  {id:'r102',  label:'Room 102',        x:162, y:0,   w:148, h:HY    },
  {id:'nurs',  label:"Nurses' Station", x:310, y:0,   w:188, h:HY    },
  {id:'r103',  label:'Room 103',        x:498, y:0,   w:262, h:HY    },
  {id:'hall',  label:'Corridor',        x:0,   y:HY,  w:FW,  h:HH   },
  {id:'r104',  label:'Room 104',        x:0,   y:HB,  w:162, h:FH-HB},
  {id:'r105',  label:'Room 105',        x:162, y:HB,  w:148, h:FH-HB},
  {id:'lounge',label:'Lounge',          x:310, y:HB,  w:188, h:FH-HB},
  {id:'r106',  label:'Room 106',        x:498, y:HB,  w:262, h:FH-HB},
];

const HUBS = [
  {id:'A', x:81,  y:94,  label:'Hub A'},
  {id:'B', x:404, y:94,  label:'Hub B'},
  {id:'C', x:629, y:94,  label:'Hub C'},
  {id:'D', x:81,  y:346, label:'Hub D'},
  {id:'E', x:404, y:346, label:'Hub E'},
];

const ZONES = [
  {id:0, name:'Zone 1', color:ZCOL[0], rooms:['r101'],           desc:'Room 101 cluster'     },
  {id:1, name:'Zone 2', color:ZCOL[1], rooms:['r102','r105'],    desc:'Rooms 102 & 105'      },
  {id:2, name:'Zone 3', color:ZCOL[2], rooms:['nurs','hall'],    desc:'Corridor & Nurses'    },
  {id:3, name:'Zone 4', color:ZCOL[3], rooms:['r103'],           desc:'Room 103 cluster'     },
  {id:4, name:'Zone 5', color:ZCOL[4], rooms:['r104'],           desc:'Room 104 cluster'     },
  {id:5, name:'Zone 6', color:ZCOL[5], rooms:['lounge','r106'],  desc:'Lounge & Room 106'    },
];

const MPOS = [
  {id:0,x:105,y:105}, {id:1,x:248,y:192}, {id:2,x:370,y:82},
  {id:3,x:516,y:125}, {id:4,x:125,y:305}, {id:5,x:488,y:298},
];

const MEDGES = [
  [0,2,.5],[0,1,.75],[1,2,.8],[2,3,.72],[2,4,.42],[2,5,.52],
  [1,4,.65],[3,5,.52],[4,5,.3],[0,4,.6],[1,3,.3],
];

const WSEG = [[0,67],[95,222],[250,390],[418,615],[643,760]];
const DX   = [81, 236, 404, 629];

const WP = [
  [81,94],[81,220],[236,220],[236,94],[236,220],[404,220],
  [404,94],[404,220],[629,220],[629,94],[629,220],[404,220],
  [81,220],[81,346],[81,220],[236,220],[236,346],[236,220],
  [404,220],[404,346],[404,220],[629,220],[629,346],[629,220],
  [81,220],[81,94],
];

const TABS = [
  {n:1, name:'RSSI clustering', sub:'k-means · GMM · DBSCAN'    },
  {n:2, name:'HMM smoothing',   sub:'zone transition model'      },
  {n:3, name:'MDS pseudo-map',  sub:'spatial reconstruction'     },
];

const BMKS = ['94–99% zone-level','~85% region-level','~4.4 m avg error'];

// ════════════════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════════════════

let stage=1, ms=0, playing=true, playSpeed=1;
let msRef=0, rafId=null, lastZone=-1, lastRssiWall=0, lastFrameNow=null;
let showFloorPlan=false, selectedHub=null;
let mdsBuildTime=0;
let scrubDragging=false, wasPlayingBeforeScrub=false;

const MDS_BUILD = 7000, MDS_HOLD = 2500, MDS_TOTAL = MDS_BUILD + MDS_HOLD;

// Pre-computed full-cycle path samples
let rawPts = [], hmmPts = [];

// ════════════════════════════════════════════════════════════════════════════
// Helpers
// ════════════════════════════════════════════════════════════════════════════

const lerp = (a,b,t) => a + (b-a)*t;
const clamp01 = v => Math.max(0, Math.min(1, v));

function dPos(t) {
  const n = WP.length - 1;
  const p = ((t % CYCLE) / CYCLE) * n;
  const i = Math.min(Math.floor(p), n-1);
  const [x1,y1] = WP[i], [x2,y2] = WP[Math.min(i+1,n)];
  return { x: lerp(x1,x2,p-i), y: lerp(y1,y2,p-i) };
}

function roomAt(x, y) {
  for (const r of ROOMS)
    if (x >= r.x && x < r.x+r.w && y >= r.y && y < r.y+r.h) return r.id;
  return 'hall';
}

function zoneOf(rid)   { return ZONES.find(z => z.rooms.includes(rid)) || ZONES[2]; }
function rssiOf(px,py,hx,hy) {
  return Math.round(Math.max(-90, -45 - 27 * Math.log10(Math.max(Math.hypot(px-hx,py-hy)/21, 0.1))));
}
function rn(v)  { return clamp01((v+90)/55); }
function ca(c, a) {
  const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function noiseX(t) { return Math.sin(t*.023)*17 + Math.cos(t*.037)*10; }
function noiseY(t) { return Math.cos(t*.031)*13 + Math.sin(t*.041)*8;  }

function se(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function sat(el, attrs) {
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
}

function precomputePaths() {
  rawPts = []; hmmPts = [];
  for (let i = 0; i < PATH_SAMPLES; i++) {
    const t = (i / PATH_SAMPLES) * CYCLE;
    const p = dPos(t);
    rawPts.push({x: p.x + noiseX(t), y: p.y + noiseY(t)});
    hmmPts.push({x: p.x, y: p.y});
  }
}

function buildPathD(pts, count) {
  if (count < 2) return '';
  let d = `M${pts[0].x.toFixed(1)},${pts[0].y.toFixed(1)}`;
  for (let i = 1; i < count; i++) d += ` L${pts[i].x.toFixed(1)},${pts[i].y.toFixed(1)}`;
  return d;
}

// ════════════════════════════════════════════════════════════════════════════
// Tooltip
// ════════════════════════════════════════════════════════════════════════════

function showTooltip(title, bodyHTML, e) {
  document.getElementById('tt-title').textContent = title;
  document.getElementById('tt-body').innerHTML = bodyHTML;
  const tt = document.getElementById('tooltip');
  tt.style.display = 'block';
  positionTooltip(e);
}
function positionTooltip(e) {
  const tt = document.getElementById('tooltip');
  if (tt.style.display === 'none') return;
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 180 > window.innerWidth)  x = e.clientX - 190;
  if (y + 140 > window.innerHeight) y = e.clientY - 140;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function hubTooltipBody(hi) {
  const h = HUBS[hi];
  const pos = dPos(ms);
  const v = rssiOf(pos.x, pos.y, h.x, h.y);
  const n = rn(v), hue = Math.round(n * 120);
  return `<div class="tt-row"><span style="color:#6b9ac4">Hub ID</span><b style="color:#e2e8f0">${h.id}</b></div>
          <div class="tt-row"><span style="color:#6b9ac4">RSSI</span><b style="color:hsl(${hue},70%,60%)">${v} dBm</b></div>`;
}

function deviceTooltipBody() {
  const pos = dPos(ms);
  const zone = zoneOf(roomAt(pos.x, pos.y));
  const rows = HUBS.map(h => {
    const v = rssiOf(pos.x, pos.y, h.x, h.y);
    const hue = Math.round(rn(v) * 120);
    return `<div class="tt-row"><span style="color:#6b9ac4">${h.label}</span><span style="color:hsl(${hue},70%,60%);font-family:monospace">${v} dBm</span></div>`;
  }).join('');
  return `<div style="color:${zone.color};font-size:10px;margin-bottom:4px">${zone.name} · ${zone.desc}</div>${rows}`;
}

// ════════════════════════════════════════════════════════════════════════════
// Floor plan overlay (room outlines, walls, furniture — no zone fills)
// ════════════════════════════════════════════════════════════════════════════

function buildFloorplanOverlay(parent) {
  const g = se('g');
  // Room outline strokes only
  ROOMS.filter(r => r.id !== 'hall').forEach(r => {
    g.appendChild(se('rect', {x:r.x+1, y:r.y+1, width:r.w-2, height:r.h-2,
      fill:'none', stroke:'#1b3450', 'stroke-width':1.2, opacity:.7}));
  });
  // Patient beds
  [{x:10,y:12},{x:172,y:12},{x:508,y:12},{x:10,y:HB+12},{x:172,y:HB+12},{x:508,y:HB+12}].forEach(b => {
    const bg = se('g', {opacity:.35});
    bg.appendChild(se('rect', {x:b.x, y:b.y, width:48, height:26, rx:3, fill:'none', stroke:'#1a3050', 'stroke-width':1.2}));
    bg.appendChild(se('rect', {x:b.x, y:b.y, width:48, height:8,  rx:2, fill:'#1a3050'}));
    g.appendChild(bg);
  });
  // Nurses desk
  g.appendChild(se('path', {d:'M 322,12 L 488,12 L 488,44 L 454,44 L 454,22 L 322,22 Z',
    fill:'none', stroke:'#1a3050', 'stroke-width':1.2, opacity:.45}));
  // Outer boundary
  g.appendChild(se('rect', {x:.75, y:.75, width:FW-1.5, height:FH-1.5,
    fill:'none', stroke:'#1b3450', 'stroke-width':1.5}));
  // Hallway walls + door arcs
  [HY, HB].forEach(wy => {
    WSEG.forEach(([x1,x2]) =>
      g.appendChild(se('line', {x1, y1:wy, x2, y2:wy, stroke:'#172b40', 'stroke-width':1.5})));
    DX.forEach(cx =>
      g.appendChild(se('path', {
        d:`M${cx-14},${wy} A14,14 0 0,${wy===HY?0:1} ${cx+14},${wy}`,
        fill:'none', stroke:'#22394f', 'stroke-width':1,
      })));
  });
  // Vertical dividers
  [162, 310, 498].forEach(x => {
    g.appendChild(se('line', {x1:x, y1:0,  x2:x, y2:HY,  stroke:'#172b40', 'stroke-width':1.5}));
    g.appendChild(se('line', {x1:x, y1:HB, x2:x, y2:FH,  stroke:'#172b40', 'stroke-width':1.5}));
  });
  // Room labels
  ROOMS.filter(r => r.id !== 'hall').forEach(r => {
    const t = se('text', {x:r.x+r.w/2, y:r.y+r.h*.64,
      fill:'#22394f', 'font-size':11, 'text-anchor':'middle', 'font-weight':500});
    t.textContent = r.label; g.appendChild(t);
  });
  // Corridor label
  const cl = se('text', {x:FW/2, y:HY+HH/2+1,
    fill:'#162535', 'font-size':10, 'text-anchor':'middle', 'dominant-baseline':'middle',
    'letter-spacing':5, 'font-weight':700});
  cl.textContent = 'CORRIDOR'; g.appendChild(cl);
  parent.appendChild(g);
  return g;
}

// ════════════════════════════════════════════════════════════════════════════
// Hub icons builder (reused in fp and mfp)
// ════════════════════════════════════════════════════════════════════════════

function buildHubIcons(parent, clickable) {
  return HUBS.map((h, hi) => {
    const g = se('g', {transform:`translate(${h.x},${h.y})`, style: clickable ? 'cursor:pointer' : ''});
    g.appendChild(se('path', {d:`M-7,-13 A9,9 0 0,1 7,-13`,  fill:'none', stroke:'#192d44', 'stroke-width':1.5}));
    g.appendChild(se('path', {d:`M-4,-10 A5,5 0 0,1 4,-10`, fill:'none', stroke:'#192d44', 'stroke-width':1.5}));
    const box = se('rect', {x:-8, y:-8, width:16, height:16, rx:3, fill:'#05101c', stroke:'#192d44', 'stroke-width':1.2});
    g.appendChild(box);
    const idTxt = se('text', {x:0, y:1, fill:'#192d44', 'font-size':9, 'text-anchor':'middle',
      'dominant-baseline':'middle', 'font-weight':700});
    idTxt.textContent = h.id; g.appendChild(idTxt);
    const lb = se('text', {x:0, y:22, fill:'#192d44', 'font-size':8, 'text-anchor':'middle'});
    lb.textContent = h.label; g.appendChild(lb);
    if (clickable) {
      g.addEventListener('click', e => {
        e.stopPropagation();
        if (selectedHub === hi) { selectedHub = null; hideTooltip(); }
        else { selectedHub = hi; showTooltip(h.label, hubTooltipBody(hi), e); }
        updateHubHighlight();
      });
    }
    parent.appendChild(g);
    return {g, box, idTxt};
  });
}

function updateHubHighlight() {
  if (!refs.hubIcons) return;
  refs.hubIcons.forEach(({box, idTxt}, i) => {
    const sel = selectedHub === i;
    box.setAttribute('stroke', sel ? '#4a9fd8' : '#192d44');
    box.setAttribute('fill',   sel ? '#0d2240' : '#05101c');
    idTxt.setAttribute('fill', sel ? '#7ec8f0' : '#192d44');
  });
}

// ════════════════════════════════════════════════════════════════════════════
// Animation loop
// ════════════════════════════════════════════════════════════════════════════

function frame(now) {
  if (lastFrameNow === null) lastFrameNow = now;
  const dt = Math.min(now - lastFrameNow, 80);
  lastFrameNow = now;

  if (!scrubDragging) {
    msRef = (msRef + dt * playSpeed) % CYCLE;
  }
  ms = msRef;

  // Sync scrubber
  if (!scrubDragging) document.getElementById('scrubber').value = Math.round(ms / CYCLE * 1000);
  document.getElementById('scrubber-time').textContent = (ms / 1000).toFixed(1) + 's';

  // Advance MDS build timer (stage 3 only)
  if (stage === 3) mdsBuildTime = (mdsBuildTime + dt * playSpeed) % MDS_TOTAL;

  const pos  = dPos(ms);
  const zone = zoneOf(roomAt(pos.x, pos.y));
  const rv   = HUBS.map(h => ({...h, v: rssiOf(pos.x, pos.y, h.x, h.y)}));
  const ph   = (ms % 2000) / 2000;

  // ── Stage 1: signal rings ──
  const s1 = stage === 1;
  document.getElementById('sig-g').style.display = s1 ? '' : 'none';
  if (s1) {
    refs.signalRings.forEach((rings, hi) => {
      const n = rn(rv[hi].v);
      rings.forEach((c, r) => {
        if (n < 0.04) { c.setAttribute('opacity', 0); return; }
        const frac = (r + 1) / rings.length;
        const phase = ((ph + r * 0.17) % 1);
        const maxR = 45 + n * 115;
        const radius = maxR * frac + Math.sin(phase * Math.PI * 2) * 8 * (1 - frac * 0.6);
        const alpha = (1 - frac) * 0.25 * n;
        const hue = Math.round(n * 120);
        c.setAttribute('r', radius.toFixed(1));
        c.setAttribute('fill', `hsl(${hue},68%,50%)`);
        c.setAttribute('opacity', alpha.toFixed(3));
      });
    });
  }

  // ── Floor plan overlay ──
  refs.fpOverlay.setAttribute('opacity', (s1 && showFloorPlan) ? 1 : 0);

  // ── RSSI lines (stage 1) ──
  refs.rlines.forEach((l, i) => {
    const h = HUBS[i], n = rn(rv[i].v);
    if (!s1 || n < .1) { l.setAttribute('opacity', 0); return; }
    sat(l, {x1:pos.x, y1:pos.y, x2:h.x, y2:h.y,
      stroke:`hsl(${Math.round(n*120)},65%,55%)`, 'stroke-width':.5+n*2.5, opacity:.1+n*.5});
  });

  // ── Trail (stage 1 only) ──
  refs.trail.forEach((c, i) => {
    if (!s1) { c.setAttribute('opacity', 0); return; }
    const t = ((ms - i * 460) % CYCLE + CYCLE) % CYCLE;
    const p = dPos(t);
    sat(c, {cx:p.x, cy:p.y, fill:zone.color, r:Math.max(1.2, 3-i*.12), opacity:(1-i/18)*.45});
  });

  // ── Stage 2: dual persistent paths ──
  const s2 = stage === 2;
  refs.rawPath.setAttribute('opacity', s2 ? 0.8 : 0);
  refs.hmmPath.setAttribute('opacity', s2 ? 0.9 : 0);
  refs.s2Legend.setAttribute('opacity', s2 ? 1   : 0);
  if (s2) {
    const k = Math.max(2, Math.round((ms / CYCLE) * PATH_SAMPLES));
    refs.rawPath.setAttribute('d', buildPathD(rawPts, k));
    refs.hmmPath.setAttribute('d', buildPathD(hmmPts, k));
  }

  // ── Device position ──
  const dp = s2 ? {x: pos.x + noiseX(ms), y: pos.y + noiseY(ms)} : pos;
  const dz = (s2 && Math.sin(ms * .0068) > .62) ? ZONES[(zone.id+2)%6] : zone;
  const showDevice = stage < 3;
  sat(refs.glow, {cx:dp.x, cy:dp.y, fill:dz.color});
  sat(refs.dot,  {cx:dp.x, cy:dp.y, fill:dz.color});
  refs.dot.setAttribute('opacity',       showDevice ? 1 : 0);
  refs.glow.setAttribute('fill-opacity', showDevice ? .15 : 0);
  const bx = Math.min(dp.x+12, FW-58), by = Math.max(dp.y-18, 10);
  sat(refs.br, {x:bx, y:by-9, fill:dz.color, opacity: showDevice ? .9 : 0});
  sat(refs.bt, {x:bx+26, y:by, opacity: showDevice ? 1 : 0});
  refs.bt.textContent = dz.name;

  // ── Stage 3: trajectory on left panel + MDS build ──
  if (stage === 3) {
    const k3 = Math.max(2, Math.round((ms / CYCLE) * PATH_SAMPLES));
    refs.mRawPath.setAttribute('d', buildPathD(rawPts, k3));
    refs.mHmmPath.setAttribute('d', buildPathD(hmmPts, k3));
    sat(refs.mdot, {cx:pos.x, cy:pos.y, fill:zone.color});

    const buildFrac = Math.min(1, mdsBuildTime / MDS_BUILD);
    const mph = (ms % 1800) / 1800;

    // Nodes appear in the first 55% of build time
    refs.mnodes.forEach((n, i) => {
      const z = ZONES[i], act = z.id === zone.id;
      const appear = i * (0.55 / MPOS.length);
      const vis = clamp01((buildFrac - appear) / 0.07);

      n.c.setAttribute('opacity', vis);
      n.c.setAttribute('r',             act && vis > .5 ? 20 : 14);
      n.c.setAttribute('fill-opacity',  vis * (act ? .85 : .18));
      n.c.setAttribute('stroke-width',  act && vis > .5 ? 1.5 : .8);
      n.nt.setAttribute('opacity', vis);
      n.nt.setAttribute('font-size',    act && vis > .5 ? 12 : 10);
      n.dt.setAttribute('opacity', vis * .8);
      n.glow.setAttribute('fill-opacity', act && vis > .5 ? .08 : 0);
      if (act && vis > .5) {
        n.pulse.setAttribute('r', 22 + mph * 18);
        n.pulse.setAttribute('opacity', (1 - mph) * vis);
      } else {
        n.pulse.setAttribute('r', 0);
        n.pulse.setAttribute('opacity', 0);
      }
    });

    // Edges appear in the latter 45% of build time
    refs.medges.forEach((l, i) => {
      const [a,b] = MEDGES[i];
      const edgeStart = 0.55 + (i / MEDGES.length) * 0.42;
      const vis = clamp01((buildFrac - edgeStart) / 0.05);
      const act = a === zone.id || b === zone.id;
      l.setAttribute('stroke',  act ? '#1c3855' : '#0e1e2e');
      l.setAttribute('opacity', vis * (act ? .7 : .35));
    });
  }

  // ── Zone badge + pills (on zone change) ──
  if (zone.id !== lastZone) {
    lastZone = zone.id;
    const zb = document.getElementById('zbadge');
    zb.style.background = ca(zone.color, .1);
    zb.style.border     = `1px solid ${ca(zone.color, .28)}`;
    document.getElementById('zb-lbl').style.color  = zone.color;
    document.getElementById('zb-name').style.color = zone.color;
    document.getElementById('zb-name').textContent = zone.name;
    document.getElementById('zb-desc').textContent = zone.desc;
    document.querySelectorAll('.zp').forEach((p, i) => {
      const z = ZONES[i], act = z.id === zone.id;
      p.style.background = act ? ca(z.color,.12) : '#f9fafb';
      p.style.color      = act ? z.color          : '#9ca3af';
      p.style.border     = `1px solid ${act ? ca(z.color,.3) : '#e5e7eb'}`;
    });
    if (stage === 3) {
      document.querySelectorAll('.szrow').forEach(row => {
        const id = parseInt(row.dataset.id);
        const z  = ZONES[id], act = z.id === zone.id;
        row.style.background = act ? ca(z.color,.1) : 'transparent';
        row.style.border     = `1px solid ${act ? ca(z.color,.3) : 'transparent'}`;
        row.querySelector('.szname').style.color = act ? z.color : '#111827';
      });
    }
  }

  // ── RSSI sidebar bars (stage 1, wall-clock throttled) ──
  if (s1 && now - lastRssiWall > 95) {
    lastRssiWall = now;
    rv.forEach(h => {
      const n=rn(h.v), hue=Math.round(n*120), col=`hsl(${hue},60%,42%)`;
      const bar = document.getElementById('rb-'+h.id);
      const val = document.getElementById('rv-'+h.id);
      if (bar) { bar.style.width = n*100+'%'; bar.style.background = col; }
      if (val) { val.textContent = h.v+' dBm'; val.style.color = col; }
    });
  }

  // Keep hub tooltip RSSI value live
  if (selectedHub !== null && stage < 3) {
    document.getElementById('tt-body').innerHTML = hubTooltipBody(selectedHub);
  }

  if (playing) rafId = requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════════════════════════════════
// UI controls
// ════════════════════════════════════════════════════════════════════════════

function setStage(n) {
  stage = n;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1===n));
  document.getElementById('fp-wrap').style.display  = n < 3 ? 'block' : 'none';
  document.getElementById('mds-wrap').style.display = n === 3 ? 'flex' : 'none';
  document.getElementById('sc').innerHTML = getSC(n);
  document.getElementById('bmark').innerHTML =
    `<span style="color:#16a34a;font-weight:500">${BMKS[n-1]}</span> · Kiarashi et al. 2023`;
  document.getElementById('sind').textContent = `Stage ${n} / 3 · Pipeline active`;
  lastZone = -1;
  selectedHub = null;
  hideTooltip();
  updateHubHighlight();
  if (n === 1) {
    document.getElementById('fp-toggle-btn')?.addEventListener('click', toggleFloorPlan);
    document.getElementById('fp-toggle-btn').textContent = showFloorPlan ? 'Hide floor plan' : 'Show floor plan';
    if (showFloorPlan) document.getElementById('fp-toggle-btn').classList.add('on');
  }
}

function toggleFloorPlan() {
  showFloorPlan = !showFloorPlan;
  const btn = document.getElementById('fp-toggle-btn');
  if (!btn) return;
  btn.textContent = showFloorPlan ? 'Hide floor plan' : 'Show floor plan';
  btn.classList.toggle('on', showFloorPlan);
}

function setSpeed(s) {
  playSpeed = s;
  ['05','1','2'].forEach(k => document.getElementById('spd'+k).classList.remove('active'));
  document.getElementById(s===0.5?'spd05':s===2?'spd2':'spd1').classList.add('active');
  lastFrameNow = null;
}

function togglePlay() {
  playing = !playing;
  document.getElementById('playbtn').textContent = playing ? '⏸' : '▶';
  if (playing) { lastFrameNow = null; rafId = requestAnimationFrame(frame); }
}

function rebuildMDS() {
  mdsBuildTime = 0;
}

    </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// Bootstrap
// ════════════════════════════════════════════════════════════════════════════

(function init() {
  // Tab bar
  const tc = document.getElementById('tabs');
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.n===1 ? ' active' : '');
    btn.onclick   = () => setStage(t.n);
    btn.innerHTML = `<div class="tname">Stage ${t.n} · ${t.name}</div><div class="tsub">${t.sub}</div>`;
    tc.appendChild(btn);
  });

  // Zone pills
  const zpc = document.getElementById('zpills');
  ZONES.forEach(z => {
    const p = document.createElement('div');
    p.className = 'zp'; p.textContent = z.name; zpc.appendChild(p);
  });

  // Pre-compute path samples, then build SVGs
  precomputePaths();
  initFP();
  initMFP();
  initMDS();

  // Scrubber wiring
  const scrub = document.getElementById('scrubber');
  scrub.addEventListener('mousedown', () => {
    scrubDragging = true;
    wasPlayingBeforeScrub = playing;
    if (!playing) { playing = true; lastFrameNow = null; rafId = requestAnimationFrame(frame); }
  });
  scrub.addEventListener('input', () => {
    msRef = (parseInt(scrub.value) / 1000) * CYCLE;
  });
  scrub.addEventListener('mouseup', () => {
    scrubDragging = false;
    if (!wasPlayingBeforeScrub) {
      playing = false;
      document.getElementById('playbtn').textContent = '▶';
    }
    lastFrameNow = null;
  });

  setStage(1);
  rafId = requestAnimationFrame(frame);
})();
</script>
</body>
</html>
