<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLE Coverage Sandbox</title>
<style>
/* ── Reset & base ──────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0f1a;
             font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
button { font-family: inherit; }

/* ── Toolbar ───────────────────────────────────────────────────── */
#toolbar {
  position: fixed; top: 0; left: 0; right: 0; height: 50px;
  background: rgba(4, 9, 20, 0.97);
  border-bottom: 1px solid rgba(14, 200, 216, 0.16);
  display: flex; align-items: center; gap: 6px; padding: 0 14px;
  z-index: 100; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  user-select: none;
}

.brand {
  font-size: 13px; font-weight: 600; color: #0ec8d8;
  letter-spacing: .3px; flex-shrink: 0; margin-right: 2px; white-space: nowrap;
}
.brand em { color: rgba(130, 195, 215, 0.42); font-style: normal; font-weight: 400; }

.vsep { width: 1px; height: 28px; background: rgba(14, 200, 216, 0.13); flex-shrink: 0; margin: 0 4px; }

/* Mode buttons */
.mbtn {
  padding: 5px 11px; border-radius: 5px; font-size: 11.5px; font-weight: 500;
  border: 1px solid rgba(14, 200, 216, 0.17); background: transparent;
  color: rgba(165, 205, 220, 0.55); cursor: pointer; transition: background .12s, color .12s, border-color .12s;
  white-space: nowrap; flex-shrink: 0; outline: none;
}
.mbtn:hover  { background: rgba(14,200,216,.09); color: #0ec8d8; border-color: rgba(14,200,216,.45); }
.mbtn.on     { background: rgba(14,200,216,.15); color: #0ec8d8; border-color: #0ec8d8; }
.mbtn.danger { border-color: rgba(239,68,68,.22); color: rgba(239,68,68,.55); }
.mbtn.danger:hover { background: rgba(239,68,68,.09); color: #ef4444; border-color: rgba(239,68,68,.65); }
.mbtn.danger.on    { background: rgba(239,68,68,.15); color: #ef4444; border-color: #ef4444; }

/* Controls */
.clbl { font-size: 11px; color: rgba(145, 190, 212, 0.48); white-space: nowrap; flex-shrink: 0; }
#rval { color: #0ec8d8; font-weight: 600; font-variant-numeric: tabular-nums; min-width: 24px; display: inline-block; }
#rslider { width: 80px; accent-color: #0ec8d8; cursor: pointer; flex-shrink: 0; }

.ckwrap { display: flex; align-items: center; gap: 5px; flex-shrink: 0; cursor: pointer; }
.ckwrap input  { accent-color: #0ec8d8; width: 13px; height: 13px; cursor: pointer; }
.ckwrap label  { font-size: 11.5px; color: rgba(160, 205, 220, 0.55); cursor: pointer; white-space: nowrap; }

#clearbtn {
  padding: 5px 12px; border-radius: 5px; font-size: 11.5px; font-weight: 500;
  border: 1px solid rgba(239,68,68,.28); background: transparent;
  color: rgba(239,68,68,.58); cursor: pointer; transition: background .12s, color .12s, border-color .12s;
  white-space: nowrap; flex-shrink: 0; margin-left: auto; outline: none;
}
#clearbtn:hover { background: rgba(239,68,68,.11); color: #ef4444; border-color: #ef4444; }

/* ── Canvas ─────────────────────────────────────────────────────── */
#canvas { position: fixed; top: 50px; left: 0; display: block; }

/* ── Tooltip ────────────────────────────────────────────────────── */
#tooltip {
  position: fixed; display: none; pointer-events: none; z-index: 200;
  background: rgba(3, 8, 20, 0.97); border: 1px solid rgba(14,200,216,.45);
  border-radius: 7px; padding: 9px 13px; min-width: 140px;
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
.tt-name { font-size: 12px; font-weight: 600; color: #0ec8d8; margin-bottom: 5px; }
.tt-xy   { font-size: 11px; color: rgba(145,195,215,.65); font-family: 'Courier New', monospace; line-height: 1.7; }
.tt-sep  { height: 1px; background: rgba(14,200,216,.12); margin: 6px 0; }
.tt-hint { font-size: 10px; color: rgba(110,165,185,.4); }

/* ── Key hint strip (bottom) ────────────────────────────────────── */
#keyhints {
  position: fixed; bottom: 0; left: 0; right: 0; height: 22px;
  background: rgba(3, 8, 20, 0.88); border-top: 1px solid rgba(14,200,216,.10);
  display: flex; align-items: center; padding: 0 14px; gap: 20px;
  pointer-events: none; z-index: 50;
}
.kh { font-size: 10px; color: rgba(110,165,185,.42); white-space: nowrap; }
.kh b { color: rgba(14,200,216,.58); font-weight: 600; }
</style>
</head>
<body>

<!-- ── Toolbar ──────────────────────────────────────────────────── -->
<div id="toolbar">
  <span class="brand">BLE&nbsp;<em>Coverage</em>&nbsp;Sandbox</span>
  <div class="vsep"></div>

  <button class="mbtn on"     data-mode="add-hub"    title="Shortcut: H">Add Hub</button>
  <button class="mbtn"        data-mode="add-device" title="Shortcut: D">Add Device</button>
  <button class="mbtn"        data-mode="add-wall"   title="Shortcut: W">Add Wall</button>
  <button class="mbtn"        data-mode="select"     title="Shortcut: S">Select / Move</button>
  <button class="mbtn danger" data-mode="delete"     title="Shortcut: X">Delete</button>

  <div class="vsep"></div>
  <span class="clbl">Radius&thinsp;<span id="rval">150</span>&thinsp;px</span>
  <input type="range" id="rslider" min="40" max="420" value="150" step="5"/>

  <div class="vsep"></div>
  <div class="ckwrap">
    <input type="checkbox" id="ringck" checked/>
    <label for="ringck">Signal rings</label>
  </div>

  <button id="clearbtn">Clear All</button>
</div>

<!-- ── Canvas ───────────────────────────────────────────────────── -->
<canvas id="canvas"></canvas>

<!-- ── Tooltip ──────────────────────────────────────────────────── -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-xy"   id="tt-xy"></div>
  <div class="tt-sep"></div>
  <div class="tt-hint">Drag to move &middot; Del to remove</div>
</div>

<!-- ── Key hints ────────────────────────────────────────────────── -->
<div id="keyhints">
  <span class="kh"><b>H</b> Add Hub</span>
  <span class="kh"><b>D</b> Add Device</span>
  <span class="kh"><b>W</b> Add Wall</span>
  <span class="kh"><b>S</b> Select</span>
  <span class="kh"><b>X</b> Delete</span>
  <span class="kh"><b>Esc</b> Cancel / Deselect</span>
  <span class="kh"><b>Del</b> Remove selected</span>
  <span class="kh"><b>Right-click</b> Cancel wall</span>
</div>

<script>
// ════════════════════════════════════════════════════════════════════════════
// § Constants
// ════════════════════════════════════════════════════════════════════════════

const GRID_PX   = 35;    // dot-grid spacing in pixels
const HUB_HS    = 14;    // hub icon half-size → 28×28 bounding box
const DEV_R     = 12;    // device circle radius
const HIT_HUB   = 20;   // click-hit radius for hubs
const HIT_DEV   = 17;   // click-hit radius for devices
const HIT_WALL  = 7;    // perpendicular-distance threshold for walls
const KB_H      = 22;   // key hints bar height (px)

// Colour palette
const C_BG      = '#0a0f1a';
const C_GRID    = 'rgba(24, 50, 86, 0.70)';
const C_HUB     = '#0ec8d8';                    // cyan
const C_HUB_BG  = '#030d18';
const C_DEV     = '#f59e0b';                    // amber
const C_DEV_BG  = '#0b0800';
const C_WALL    = 'rgba(172, 204, 228, 0.72)';
const C_RED     = '#ef4444';                    // delete / hover highlight

// ════════════════════════════════════════════════════════════════════════════
// § State
// ════════════════════════════════════════════════════════════════════════════

const S = {
  // Interaction mode
  mode: 'add-hub',  // 'add-hub' | 'add-device' | 'add-wall' | 'select' | 'delete'

  // Placed elements
  hubs:    [],  // [{x, y, label}]
  devices: [],  // [{x, y, label}]
  walls:   [],  // [{x1, y1, x2, y2}]

  // User-controlled settings
  radius:    150,
  showRings: true,

  // Auto-increment counters (never decremented; labels stay unique after deletion)
  hubCount: 0,
  devCount: 0,

  // Active drag: null or {type:'hub'|'device', idx, ox, oy}
  drag: null,

  // Wall currently being drawn: null or {x, y} of start point
  wallStart: null,

  // Selected element (used in select mode): null or {type, idx}
  selected: null,

  // Whether the current pointer-down has moved ≥ threshold (distinguishes click vs drag)
  hasDragged:  false,
  mouseDownAt: null,  // {x, y}

  // Hover indices for delete-mode red highlight (-1 = none)
  hoverHub:  -1,
  hoverDev:  -1,
  hoverWall: -1,

  // Current mouse position in canvas coordinates
  mouse: { x: 0, y: 0 },
};

// ════════════════════════════════════════════════════════════════════════════
// § Canvas setup
// ════════════════════════════════════════════════════════════════════════════

const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const toolbar = document.getElementById('toolbar');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight - toolbar.offsetHeight - KB_H;
}
window.addEventListener('resize', resize);
resize();

// ════════════════════════════════════════════════════════════════════════════
// § Utility helpers
// ════════════════════════════════════════════════════════════════════════════

// Convert a MouseEvent to canvas-local {x, y}
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// Generate hub label: 0→'Hub A', 25→'Hub Z', 26→'Hub AA', …
function hubLabel(n) {
  let s = '', i = n;
  do {
    s = String.fromCharCode(65 + i % 26) + s;
    i = Math.floor(i / 26) - 1;
  } while (i >= 0);
  return 'Hub ' + s;
}

// Minimum distance from point (px,py) to segment (ax,ay)→(bx,by)
function ptSegDist(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (!len2) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / len2));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

// Add a rounded-rect path to ctx. Caller must ctx.beginPath() first.
function rrect(x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);   ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);   ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);        ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

// ════════════════════════════════════════════════════════════════════════════
// § Hit detection
// ════════════════════════════════════════════════════════════════════════════

// Returns index of topmost hub under (x,y), or -1
function hitHub(x, y) {
  for (let i = S.hubs.length - 1; i >= 0; i--)
    if (Math.hypot(x - S.hubs[i].x, y - S.hubs[i].y) < HIT_HUB) return i;
  return -1;
}

// Returns index of topmost device under (x,y), or -1
function hitDev(x, y) {
  for (let i = S.devices.length - 1; i >= 0; i--)
    if (Math.hypot(x - S.devices[i].x, y - S.devices[i].y) < HIT_DEV) return i;
  return -1;
}

// Returns index of topmost wall within HIT_WALL px of (x,y), or -1
function hitWall(x, y) {
  for (let i = S.walls.length - 1; i >= 0; i--) {
    const w = S.walls[i];
    if (ptSegDist(x, y, w.x1, w.y1, w.x2, w.y2) < HIT_WALL) return i;
  }
  return -1;
}

// ════════════════════════════════════════════════════════════════════════════
// § Draw functions
// ════════════════════════════════════════════════════════════════════════════

// ── Dot grid ──────────────────────────────────────────────────────────────
function drawGrid() {
  ctx.fillStyle = C_GRID;
  for (let x = GRID_PX; x < canvas.width;  x += GRID_PX)
  for (let y = GRID_PX; y < canvas.height; y += GRID_PX)
    ctx.fillRect(x - 0.75, y - 0.75, 1.5, 1.5);
}

// ── Hub signal rings ───────────────────────────────────────────────────────
// Draws a smooth radial gradient fill + 4 discrete ring outlines.
function drawHubRings(hub) {
  const { x, y } = hub;
  const R = S.radius;

  // Ambient glow: smooth gradient from center to radius edge
  const grd = ctx.createRadialGradient(x, y, R * 0.04, x, y, R);
  grd.addColorStop(0,    'rgba(14, 200, 216, 0.13)');
  grd.addColorStop(0.45, 'rgba(14, 200, 216, 0.06)');
  grd.addColorStop(1,    'rgba(14, 200, 216, 0)');
  ctx.fillStyle = grd;
  ctx.beginPath();
  ctx.arc(x, y, R, 0, Math.PI * 2);
  ctx.fill();

  // Discrete concentric rings at 30 / 55 / 76 / 100 % of detection radius
  const rings = [
    [0.30, 0.58],
    [0.55, 0.40],
    [0.76, 0.24],
    [1.00, 0.14],
  ];
  ctx.lineWidth = 1;
  for (const [frac, op] of rings) {
    ctx.beginPath();
    ctx.arc(x, y, R * frac, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(14, 200, 216, ${op})`;
    ctx.stroke();
  }
}

// ── Hub icon ───────────────────────────────────────────────────────────────
// 28×28 rounded square with BLE-style arcs inside + label below.
function drawHub(hub, isSel, isDel) {
  const { x, y } = hub;
  const HS  = HUB_HS;
  const col = isDel ? C_RED : C_HUB;

  // Shadow glow
  ctx.shadowColor = col;
  ctx.shadowBlur  = isSel ? 18 : isDel ? 12 : 0;

  // Box fill
  ctx.fillStyle = C_HUB_BG;
  ctx.beginPath();
  rrect(x - HS, y - HS, HS * 2, HS * 2, 4);
  ctx.fill();

  // Box border
  ctx.strokeStyle = col;
  ctx.lineWidth   = isSel ? 2.2 : 1.5;
  ctx.stroke();

  ctx.shadowBlur = 0;

  // BLE / wifi arcs inside upper half of box (upward-opening, 210°→330°)
  ctx.lineWidth = 1.5;
  ctx.lineCap   = 'round';
  for (let i = 0; i < 3; i++) {
    const r = 4 + i * 3;  // radii: 4, 7, 10
    ctx.beginPath();
    ctx.arc(x, y - 2, r, Math.PI * 1.17, Math.PI * 1.83, false);
    ctx.strokeStyle  = col;
    ctx.globalAlpha  = 0.28 + i * 0.24;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Centre signal dot
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(x, y - 2, 2, 0, Math.PI * 2);
  ctx.fill();

  // Short letter identifier in lower portion of box
  ctx.fillStyle    = col;
  ctx.globalAlpha  = 0.55;
  ctx.font         = 'bold 9px "Courier New", monospace';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(hub.label.slice(4), x, y + 8);  // slice 'Hub '
  ctx.globalAlpha = 1;

  // Full label below the box
  ctx.fillStyle    = isDel ? C_RED : isSel ? '#ccf0ff' : 'rgba(14, 200, 216, 0.82)';
  ctx.font         = '11px Inter, -apple-system, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(hub.label, x, y + HS + 5);
}

// ── Device icon ────────────────────────────────────────────────────────────
// Small circle with inner dot + label below.
function drawDevice(dev, isSel, isDel) {
  const { x, y } = dev;
  const col = isDel ? C_RED : C_DEV;

  ctx.shadowColor = col;
  ctx.shadowBlur  = isSel ? 18 : isDel ? 12 : 0;

  ctx.fillStyle   = C_DEV_BG;
  ctx.strokeStyle = col;
  ctx.lineWidth   = isSel ? 2.2 : 1.5;
  ctx.beginPath();
  ctx.arc(x, y, DEV_R, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Inner dot
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.arc(x, y, isSel ? 5 : 3.5, 0, Math.PI * 2);
  ctx.fill();

  // Label below
  ctx.fillStyle    = isDel ? C_RED : isSel ? '#fff0cc' : 'rgba(245, 158, 11, 0.82)';
  ctx.font         = '11px Inter, -apple-system, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText(dev.label, x, y + DEV_R + 5);
}

// ── Wall segment ───────────────────────────────────────────────────────────
function drawWall(wall, isHov) {
  ctx.lineCap     = 'round';
  ctx.lineWidth   = isHov ? 3.5 : 2.5;
  ctx.strokeStyle = isHov ? C_RED : C_WALL;
  ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(wall.x1, wall.y1);
  ctx.lineTo(wall.x2, wall.y2);
  ctx.stroke();

  // Small end-cap dots for visual handles
  const dotR = isHov ? 4 : 3;
  for (const p of [{ x: wall.x1, y: wall.y1 }, { x: wall.x2, y: wall.y2 }]) {
    ctx.fillStyle = isHov ? C_RED : C_WALL;
    ctx.beginPath();
    ctx.arc(p.x, p.y, dotR, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ── Wall draw preview (ghost line while dragging in add-wall mode) ─────────
function drawWallPreview() {
  const { x: x1, y: y1 } = S.wallStart;
  const { x: x2, y: y2 } = S.mouse;

  // Dashed preview line
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.strokeStyle = 'rgba(172, 204, 228, 0.35)';
  ctx.lineWidth   = 2.5;
  ctx.lineCap     = 'round';
  ctx.setLineDash([9, 6]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Start-point anchor dot
  ctx.fillStyle = 'rgba(172, 204, 228, 0.52)';
  ctx.beginPath();
  ctx.arc(x1, y1, 4, 0, Math.PI * 2);
  ctx.fill();

  // Length readout near cursor
  const len = Math.round(Math.hypot(x2 - x1, y2 - y1));
  if (len > 10) {
    ctx.fillStyle    = 'rgba(172, 204, 228, 0.45)';
    ctx.font         = '11px Inter, sans-serif';
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText(len + ' px', x2 + 8, y2 - 4);
  }
}

// ── RSSI connection lines (device → hub, dashed, opacity by proximity) ────
function drawConnections() {
  ctx.lineCap = 'round';
  for (const dev of S.devices) {
    for (const hub of S.hubs) {
      const dist = Math.hypot(dev.x - hub.x, dev.y - hub.y);
      if (dist > S.radius) continue;

      const strength = 1 - dist / S.radius;       // 1.0 at hub, 0.0 at radius edge
      const alpha    = (0.10 + strength * 0.72).toFixed(3);
      const lw       = 0.6  + strength * 2.2;

      ctx.beginPath();
      ctx.moveTo(dev.x, dev.y);
      ctx.lineTo(hub.x, hub.y);
      ctx.strokeStyle = `rgba(14, 200, 216, ${alpha})`;
      ctx.lineWidth   = lw;
      ctx.setLineDash([7, 5]);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  }
}

// ── Empty-canvas instructional hint ───────────────────────────────────────
function drawHint() {
  const msgs = {
    'add-hub':    'Click anywhere to place a BioHub anchor node',
    'add-device': 'Click anywhere to place a Bio Button device',
    'add-wall':   'Click and drag to draw a wall segment',
    'select':     'Click an element to select it · drag to move',
    'delete':     'Click any element to remove it from the canvas',
  };
  ctx.fillStyle    = 'rgba(14, 200, 216, 0.20)';
  ctx.font         = '15px Inter, -apple-system, sans-serif';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(msgs[S.mode] || '', canvas.width / 2, canvas.height / 2);
}

// ── Active mode label (bottom-left corner) ────────────────────────────────
function drawModeLabel() {
  const labels = {
    'add-hub':    'ADD HUB',
    'add-device': 'ADD DEVICE',
    'add-wall':   'ADD WALL',
    'select':     'SELECT / MOVE',
    'delete':     'DELETE',
  };
  ctx.fillStyle    = 'rgba(14, 200, 216, 0.26)';
  ctx.font         = '600 9.5px Inter, sans-serif';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'bottom';
  ctx.fillText(labels[S.mode] || '', 12, canvas.height - 8);
}

// ════════════════════════════════════════════════════════════════════════════
// § Main render — compositor, called every RAF tick
// ════════════════════════════════════════════════════════════════════════════

function render() {
  // Background
  ctx.fillStyle = C_BG;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 1. Dot grid (bottom-most layer)
  drawGrid();

  // 2. Signal rings (behind walls and nodes)
  if (S.showRings) for (const h of S.hubs) drawHubRings(h);

  // 3. Walls
  for (let i = 0; i < S.walls.length; i++) drawWall(S.walls[i], i === S.hoverWall);

  // 4. Wall ghost line while drawing
  if (S.mode === 'add-wall' && S.wallStart) drawWallPreview();

  // 5. RSSI connection lines (behind node icons)
  drawConnections();

  // 6. Hub icons
  for (let i = 0; i < S.hubs.length; i++) {
    drawHub(
      S.hubs[i],
      S.selected?.type === 'hub'    && S.selected.idx === i,
      S.mode === 'delete'           && i === S.hoverHub,
    );
  }

  // 7. Device icons
  for (let i = 0; i < S.devices.length; i++) {
    drawDevice(
      S.devices[i],
      S.selected?.type === 'device' && S.selected.idx === i,
      S.mode === 'delete'           && i === S.hoverDev,
    );
  }

  // 8. Overlays
  drawModeLabel();
  const isEmpty = !S.hubs.length && !S.devices.length && !S.walls.length && !S.wallStart;
  if (isEmpty) drawHint();
}

// Animation loop
(function loop() { render(); requestAnimationFrame(loop); })();

// ════════════════════════════════════════════════════════════════════════════
// § Tooltip
// ════════════════════════════════════════════════════════════════════════════

const ttEl = document.getElementById('tooltip');

function showTooltip(type, idx) {
  const item = type === 'hub' ? S.hubs[idx] : S.devices[idx];
  if (!item) { hideTooltip(); return; }

  document.getElementById('tt-name').textContent = item.label;
  document.getElementById('tt-xy').innerHTML =
    `x&thinsp;:&thinsp;${Math.round(item.x)}<br>y&thinsp;:&thinsp;${Math.round(item.y)}`;

  // Position tooltip near item, clamp to viewport
  const cr = canvas.getBoundingClientRect();
  let tx = item.x + cr.left + 22;
  let ty = item.y + cr.top  - 14;
  if (tx + 175 > window.innerWidth)  tx = item.x + cr.left - 178;
  if (ty + 100 > window.innerHeight) ty = item.y + cr.top  - 98;
  if (ty < 58)                        ty = item.y + cr.top  + 24;

  ttEl.style.left    = tx + 'px';
  ttEl.style.top     = ty + 'px';
  ttEl.style.display = 'block';
}

// Re-sync tooltip position when selected element is being dragged
function updateTooltip() {
  if (ttEl.style.display === 'none' || !S.selected) return;
  showTooltip(S.selected.type, S.selected.idx);
}

function hideTooltip() { ttEl.style.display = 'none'; }

// ════════════════════════════════════════════════════════════════════════════
// § Hover state + cursor (refreshed on every mousemove)
// ════════════════════════════════════════════════════════════════════════════

function refreshHover(x, y) {
  // Only show red hover highlights in delete mode
  if (S.mode === 'delete') {
    S.hoverHub  = hitHub(x, y);
    S.hoverDev  = S.hoverHub  >= 0 ? -1 : hitDev(x, y);
    S.hoverWall = (S.hoverHub >= 0 || S.hoverDev >= 0) ? -1 : hitWall(x, y);
    const hit = S.hoverHub >= 0 || S.hoverDev >= 0 || S.hoverWall >= 0;
    canvas.style.cursor = hit ? 'pointer' : 'crosshair';
    return;
  }

  // Clear delete highlights in all other modes
  S.hoverHub = S.hoverDev = S.hoverWall = -1;

  if (S.mode === 'select') {
    if (S.drag) { canvas.style.cursor = 'grabbing'; return; }
    canvas.style.cursor = (hitHub(x, y) >= 0 || hitDev(x, y) >= 0) ? 'grab' : 'default';
    return;
  }

  canvas.style.cursor = 'crosshair';
}

// ════════════════════════════════════════════════════════════════════════════
// § Event handling
// ════════════════════════════════════════════════════════════════════════════

// Use window for mousemove/mouseup so drags aren't cancelled when leaving canvas
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  e.preventDefault();
  const pos = canvasPos(e);
  S.mouseDownAt = pos;
  S.hasDragged  = false;

  switch (S.mode) {

    case 'add-hub': {
      const label = hubLabel(S.hubCount++);
      S.hubs.push({ x: pos.x, y: pos.y, label });
      S.selected = { type: 'hub', idx: S.hubs.length - 1 };
      hideTooltip();
      break;
    }

    case 'add-device': {
      const label = 'Device ' + (++S.devCount);
      S.devices.push({ x: pos.x, y: pos.y, label });
      S.selected = { type: 'device', idx: S.devices.length - 1 };
      hideTooltip();
      break;
    }

    case 'add-wall': {
      S.wallStart = { x: pos.x, y: pos.y };
      break;
    }

    case 'select': {
      const hi = hitHub(pos.x, pos.y);
      const di = hi < 0 ? hitDev(pos.x, pos.y) : -1;

      if (hi >= 0) {
        // Hub grabbed — begin drag
        S.drag     = { type: 'hub', idx: hi, ox: pos.x - S.hubs[hi].x, oy: pos.y - S.hubs[hi].y };
        S.selected = { type: 'hub', idx: hi };
        hideTooltip();
      } else if (di >= 0) {
        // Device grabbed — begin drag
        S.drag     = { type: 'device', idx: di, ox: pos.x - S.devices[di].x, oy: pos.y - S.devices[di].y };
        S.selected = { type: 'device', idx: di };
        hideTooltip();
      } else {
        // Clicked empty canvas — deselect
        S.selected = null;
        hideTooltip();
      }
      break;
    }

    case 'delete': {
      const hi = hitHub(pos.x, pos.y);
      if (hi >= 0) { S.hubs.splice(hi, 1); S.selected = null; hideTooltip(); return; }
      const di = hitDev(pos.x, pos.y);
      if (di >= 0) { S.devices.splice(di, 1); S.selected = null; hideTooltip(); return; }
      const wi = hitWall(pos.x, pos.y);
      if (wi >= 0) { S.walls.splice(wi, 1); return; }
      break;
    }
  }
});

window.addEventListener('mousemove', e => {
  const pos = canvasPos(e);
  S.mouse = pos;

  // Move the dragged element
  if (S.drag) {
    S.hasDragged = true;
    const { type, idx, ox, oy } = S.drag;
    if (type === 'hub')    { S.hubs[idx].x    = pos.x - ox; S.hubs[idx].y    = pos.y - oy; }
    if (type === 'device') { S.devices[idx].x = pos.x - ox; S.devices[idx].y = pos.y - oy; }
    updateTooltip();
  }

  // Only update hover state when pointer is inside the canvas area
  const inCanvas = pos.x >= 0 && pos.x <= canvas.width &&
                   pos.y >= 0 && pos.y <= canvas.height;
  if (inCanvas) refreshHover(pos.x, pos.y);
});

window.addEventListener('mouseup', e => {
  if (e.button !== 0) return;
  const pos = canvasPos(e);

  // Commit wall if the drag was long enough
  if (S.mode === 'add-wall' && S.wallStart) {
    const dx = pos.x - S.wallStart.x, dy = pos.y - S.wallStart.y;
    if (dx * dx + dy * dy > 64) {  // minimum ~8 px
      S.walls.push({ x1: S.wallStart.x, y1: S.wallStart.y, x2: pos.x, y2: pos.y });
    }
    S.wallStart = null;
  }

  // Click (no meaningful drag) in select mode → show tooltip
  if (S.mode === 'select' && !S.hasDragged && S.selected) {
    showTooltip(S.selected.type, S.selected.idx);
  }

  S.drag = null;
  refreshHover(pos.x, pos.y);
});

// Right-click: cancel in-progress wall, or deselect
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  if (S.wallStart)  { S.wallStart = null; return; }
  if (S.drag)       { S.drag = null; return; }
  if (S.selected)   { S.selected = null; hideTooltip(); }
});

// Clear delete hover when pointer leaves canvas
canvas.addEventListener('mouseleave', () => {
  S.hoverHub = S.hoverDev = S.hoverWall = -1;
});

// ════════════════════════════════════════════════════════════════════════════
// § Keyboard shortcuts
// ════════════════════════════════════════════════════════════════════════════

window.addEventListener('keydown', e => {
  // Don't intercept shortcuts when a form control is focused
  const tag = document.activeElement?.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;

  switch (e.key) {
    case 'h': case 'H': setMode('add-hub');    break;
    case 'd': case 'D': setMode('add-device'); break;
    case 'w': case 'W': setMode('add-wall');   break;
    case 's': case 'S': setMode('select');     break;
    case 'x': case 'X': setMode('delete');     break;

    case 'Escape':
      if (S.wallStart) { S.wallStart = null; break; }
      if (S.drag)      { S.drag = null; break; }
      S.selected = null; hideTooltip();
      break;

    case 'Delete':
    case 'Backspace':
      if (S.selected) {
        if (S.selected.type === 'hub')    S.hubs.splice(S.selected.idx, 1);
        if (S.selected.type === 'device') S.devices.splice(S.selected.idx, 1);
        S.selected = null; S.drag = null; hideTooltip();
        e.preventDefault();
      }
      break;
  }
});

// ════════════════════════════════════════════════════════════════════════════
// § Toolbar wiring
// ════════════════════════════════════════════════════════════════════════════

function setMode(mode) {
  S.mode = mode;
  // Cancel any in-progress wall or drag when switching modes
  S.wallStart  = null;
  S.drag       = null;
  S.selected   = null;
  S.hoverHub   = S.hoverDev = S.hoverWall = -1;
  hideTooltip();
  document.querySelectorAll('.mbtn').forEach(b =>
    b.classList.toggle('on', b.dataset.mode === mode)
  );
  refreshHover(S.mouse.x, S.mouse.y);
}

// Mode buttons
document.querySelectorAll('.mbtn').forEach(btn =>
  btn.addEventListener('click', () => setMode(btn.dataset.mode))
);

// Detection radius slider
const rslider = document.getElementById('rslider');
const rval    = document.getElementById('rval');
rslider.addEventListener('input', () => {
  S.radius = parseInt(rslider.value);
  rval.textContent = S.radius;
});

// Signal rings toggle
document.getElementById('ringck').addEventListener('change', e => {
  S.showRings = e.target.checked;
});

// Clear all elements and reset counters
document.getElementById('clearbtn').addEventListener('click', () => {
  S.hubs    = [];
  S.devices = [];
  S.walls   = [];
  S.hubCount = 0;
  S.devCount = 0;
  S.selected   = null;
  S.drag       = null;
  S.wallStart  = null;
  S.hoverHub   = S.hoverDev = S.hoverWall = -1;
  hideTooltip();
});
</script>
</body>
</html>
