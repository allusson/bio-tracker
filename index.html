<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BioIntelliSense — Location Intelligence Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', 'Segoe UI', sans-serif; background: #f3f4f6; }
  button { font-family: inherit; cursor: pointer; transition: all .15s; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

  /* ── Layout ── */
  #app  { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  #hdr  { height: 56px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; gap: 14px; }
  #main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #sb   { width: 272px; flex-shrink: 0; border-right: 1px solid #e5e7eb; background: #fff; padding: 14px; overflow-y: auto; }
  #viz  { flex: 1; padding: 12px; min-width: 0; overflow: hidden; background: #f9fafb; display: flex; flex-direction: column; }
  #ftr  { height: 58px; border-top: 1px solid #e5e7eb; display: flex; align-items: center; padding: 0 16px; background: #fff; flex-shrink: 0; gap: 8px; overflow-x: auto; }

  /* ── Tabs ── */
  .tab { padding: 5px 11px 3px; border-radius: 6px; border: none; background: transparent; text-align: left; flex-shrink: 0; border-bottom: 2px solid transparent; }
  .tab.active { border-bottom: 2px solid #2563eb; }
  .tab .tname { font-size: 12px; font-weight: 500; white-space: nowrap; color: #6b7280; }
  .tab.active .tname { color: #111827; }
  .tab .tsub { font-size: 9px; color: #9ca3af; white-space: nowrap; }

  /* ── Play button ── */
  #playbtn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid #d1d5db; background: #f9fafb; color: #6b7280; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── Zone badge ── */
  #zbadge { border-radius: 12px; padding: 11px; margin-bottom: 14px; }
  #zb-lbl { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 3px; }
  #zb-name { font-size: 21px; font-weight: 500; margin-bottom: 2px; line-height: 1.1; }
  #zb-desc { font-size: 11px; color: #6b7280; }

  /* ── Sidebar cards ── */
  .sc-lbl { font-size: 9px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: #9ca3af; margin-bottom: 7px; }
  .sc-card { background: #f9fafb; border-radius: 8px; padding: 10px; margin-bottom: 12px; border: 1px solid #e5e7eb; font-size: 12px; color: #4b5563; line-height: 1.6; }
  .sc-card-title { font-size: 13px; font-weight: 500; color: #111827; margin-bottom: 3px; }

  /* ── Mode toggle buttons ── */
  .mode-btn { flex: 1; padding: 8px 6px; border-radius: 8px; font-size: 12px; font-weight: 500; border: 1px solid #e5e7eb; background: #f9fafb; color: #6b7280; }
  .mode-btn.raw-active   { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
  .mode-btn.smooth-active { background: #eff6ff; color: #1d4ed8; border-color: #93c5fd; }

  /* ── Zone pills ── */
  .zp { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; flex-shrink: 0; transition: all .25s; background: #f9fafb; color: #9ca3af; border: 1px solid #e5e7eb; }

  /* ── Zone list (stage 3) ── */
  .szrow { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border-radius: 8px; margin-bottom: 4px; transition: all .2s; border: 1px solid transparent; }
  .szdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .szname { font-size: 12px; font-weight: 500; color: #111827; }
  .szdesc { font-size: 10px; color: #9ca3af; }

  /* ── MDS layout ── */
  #mds-wrap { width: 100%; height: 100%; display: none; gap: 10px; align-items: stretch; }
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div id="hdr">
    <div style="flex-shrink:0">
      <div style="font-size:14px;font-weight:500;color:#111827;line-height:1.2">BioIntelliSense</div>
      <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;line-height:1.2">Location intelligence demo</div>
    </div>
    <div style="width:1px;height:26px;background:#e5e7eb;flex-shrink:0"></div>
    <div id="tabs" style="display:flex;gap:2px;flex:1;overflow:hidden"></div>
    <button id="playbtn" onclick="togglePlay()">⏸</button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Sidebar -->
    <div id="sb">
      <div id="zbadge">
        <div id="zb-lbl" class="">Currently in</div>
        <div id="zb-name"></div>
        <div id="zb-desc" class=""></div>
      </div>
      <div id="sc"></div>
    </div>

    <!-- Visualization -->
    <div id="viz">

      <!-- Floor plan (stages 1 & 2) -->
      <div id="fp-wrap" style="width:100%;height:100%">
        <svg id="fp" viewBox="0 0 760 440" style="width:100%;height:100%;display:block"
             preserveAspectRatio="xMidYMid meet"></svg>
      </div>

      <!-- MDS view (stage 3) -->
      <div id="mds-wrap" style="flex:1;min-height:0">
        <div style="flex:0 0 40%;display:flex;flex-direction:column">
          <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;flex-shrink:0">Actual floor plan</div>
          <div style="flex:1;min-height:0">
            <svg id="mfp" viewBox="0 0 760 440" style="width:100%;height:100%;display:block"
                 preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;flex-shrink:0;padding:0 4px">
          <span style="writing-mode:vertical-lr;font-size:8px;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;font-weight:500">MDS derives</span>
          <span style="font-size:16px;color:#9ca3af">→</span>
        </div>
        <div style="flex:1;display:flex;flex-direction:column">
          <div style="display:flex;justify-content:space-between;margin-bottom:7px;flex-shrink:0">
            <div style="font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase">MDS pseudo-map · data-derived</div>
            <div style="font-size:9px;color:#9ca3af;font-style:italic">topological, not metric</div>
          </div>
          <div style="flex:1;min-height:0">
            <svg id="mg" viewBox="0 0 560 360" style="width:100%;height:100%;display:block"
                 preserveAspectRatio="xMidYMid meet"></svg>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Footer -->
  <div id="ftr">
    <div style="font-size:9px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:#9ca3af;flex-shrink:0">Zones</div>
    <div id="zpills" style="display:flex;gap:6px"></div>
    <div style="width:1px;height:18px;background:#e5e7eb;flex-shrink:0"></div>
    <div id="bmark" style="font-size:11px;color:#6b7280;flex-shrink:0"></div>
    <div style="margin-left:auto;font-size:9px;color:#9ca3af;font-weight:500;letter-spacing:1px;text-transform:uppercase;flex-shrink:0" id="sind">Stage 1 / 3</div>
  </div>

</div><!-- #app -->

<script>
// ════════════════════════════════════════════════════════════════════════════
// Data
// ════════════════════════════════════════════════════════════════════════════

const FW=760, FH=440, HY=188, HH=64, HB=252, CYCLE=24000;
const ZCOL = ['#4a7fe8','#22c47a','#e89810','#8a6edc','#e04e4e','#0ec8d8'];

const ROOMS = [
  {id:'r101',  label:'Room 101',        x:0,   y:0,   w:162, h:HY    },
  {id:'r102',  label:'Room 102',        x:162, y:0,   w:148, h:HY    },
  {id:'nurs',  label:"Nurses' Station", x:310, y:0,   w:188, h:HY    },
  {id:'r103',  label:'Room 103',        x:498, y:0,   w:262, h:HY    },
  {id:'hall',  label:'Corridor',        x:0,   y:HY,  w:FW,  h:HH   },
  {id:'r104',  label:'Room 104',        x:0,   y:HB,  w:162, h:FH-HB},
  {id:'r105',  label:'Room 105',        x:162, y:HB,  w:148, h:FH-HB},
  {id:'lounge',label:'Lounge',          x:310, y:HB,  w:188, h:FH-HB},
  {id:'r106',  label:'Room 106',        x:498, y:HB,  w:262, h:FH-HB},
];

const HUBS = [
  {id:'A', x:81,  y:94,  label:'Hub A'},
  {id:'B', x:404, y:94,  label:'Hub B'},
  {id:'C', x:629, y:94,  label:'Hub C'},
  {id:'D', x:81,  y:346, label:'Hub D'},
  {id:'E', x:404, y:346, label:'Hub E'},
];

const ZONES = [
  {id:0, name:'Zone 1', color:ZCOL[0], rooms:['r101'],           desc:'Room 101 cluster'     },
  {id:1, name:'Zone 2', color:ZCOL[1], rooms:['r102','r105'],    desc:'Rooms 102 & 105'      },
  {id:2, name:'Zone 3', color:ZCOL[2], rooms:['nurs','hall'],    desc:'Corridor & Nurses'    },
  {id:3, name:'Zone 4', color:ZCOL[3], rooms:['r103'],           desc:'Room 103 cluster'     },
  {id:4, name:'Zone 5', color:ZCOL[4], rooms:['r104'],           desc:'Room 104 cluster'     },
  {id:5, name:'Zone 6', color:ZCOL[5], rooms:['lounge','r106'],  desc:'Lounge & Room 106'    },
];

const MPOS = [
  {id:0,x:105,y:105}, {id:1,x:248,y:192}, {id:2,x:370,y:82},
  {id:3,x:516,y:125}, {id:4,x:125,y:305}, {id:5,x:488,y:298},
];

const MEDGES = [
  [0,2,.5],[0,1,.75],[1,2,.8],[2,3,.72],[2,4,.42],[2,5,.52],
  [1,4,.65],[3,5,.52],[4,5,.3],[0,4,.6],[1,3,.3],
];

// Wall segments: gaps at door positions (hub x ± 14px)
const WSEG = [[0,67],[95,222],[250,390],[418,615],[643,760]];
const DX   = [81, 236, 404, 629]; // door x-centers

// Device trajectory waypoints
const WP = [
  [81,94],[81,220],[236,220],[236,94],[236,220],[404,220],
  [404,94],[404,220],[629,220],[629,94],[629,220],[404,220],
  [81,220],[81,346],[81,220],[236,220],[236,346],[236,220],
  [404,220],[404,346],[404,220],[629,220],[629,346],[629,220],
  [81,220],[81,94],
];

const TABS = [
  {n:1, name:'RSSI clustering', sub:'k-means · GMM · DBSCAN'    },
  {n:2, name:'HMM smoothing',   sub:'zone transition model'      },
  {n:3, name:'MDS pseudo-map',  sub:'spatial reconstruction'     },
];

const BMKS = ['94–99% zone-level','~85% region-level','~4.4 m avg error'];

// ════════════════════════════════════════════════════════════════════════════
// State
// ════════════════════════════════════════════════════════════════════════════

let stage=1, ms=0, playing=true, showRaw=true;
let startTime=null, msRef=0, rafId=null, lastZone=-1, lastRssiT=0;

// ════════════════════════════════════════════════════════════════════════════
// Helpers
// ════════════════════════════════════════════════════════════════════════════

const lerp = (a,b,t) => a + (b-a)*t;

function dPos(t) {
  const n = WP.length - 1;
  const p = ((t % CYCLE) / CYCLE) * n;
  const i = Math.min(Math.floor(p), n-1);
  const [x1,y1] = WP[i], [x2,y2] = WP[Math.min(i+1,n)];
  return { x: lerp(x1,x2,p-i), y: lerp(y1,y2,p-i) };
}

function roomAt(x, y) {
  for (const r of ROOMS)
    if (x >= r.x && x < r.x+r.w && y >= r.y && y < r.y+r.h) return r.id;
  return 'hall';
}

function zoneOf(rid)  { return ZONES.find(z => z.rooms.includes(rid)) || ZONES[2]; }
function rssiOf(dx,dy,hx,hy) {
  return Math.round(Math.max(-90, -45 - 27 * Math.log10(Math.max(Math.hypot(dx-hx,dy-hy)/21, 0.1))));
}
function rn(v)       { return Math.max(0, Math.min(1, (v+90)/55)); }
function ca(c, a)    {
  const r=parseInt(c.slice(1,3),16), g=parseInt(c.slice(3,5),16), b=parseInt(c.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// SVG element helpers
function se(tag, attrs={}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}
function sat(el, attrs) {
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// ════════════════════════════════════════════════════════════════════════════
// SVG floor plan builder (shared by main FP and mini FP in stage 3)
// ════════════════════════════════════════════════════════════════════════════

function buildBase(svg) {
  svg.appendChild(se('rect', {width:FW, height:FH, fill:'#08111d'}));

  // Zone fills
  const fills = ROOMS.map(r => {
    const z = zoneOf(r.id);
    const el = se('rect', {x:r.x+1, y:r.y+1, width:r.w-2, height:r.h-2, fill:z.color, 'fill-opacity':.07});
    svg.appendChild(el);
    return el;
  });

  // Patient beds
  [{x:10,y:12},{x:172,y:12},{x:508,y:12},{x:10,y:HB+12},{x:172,y:HB+12},{x:508,y:HB+12}].forEach(b => {
    const g = se('g', {opacity:.38});
    g.appendChild(se('rect', {x:b.x, y:b.y, width:48, height:26, rx:3, fill:'none', stroke:'#1a3050', 'stroke-width':1.2}));
    g.appendChild(se('rect', {x:b.x, y:b.y, width:48, height:8,  rx:2, fill:'#1a3050'}));
    svg.appendChild(g);
  });

  // Nurses desk
  svg.appendChild(se('path', {d:'M 322,12 L 488,12 L 488,44 L 454,44 L 454,22 L 322,22 Z',
    fill:'none', stroke:'#1a3050', 'stroke-width':1.2, opacity:.5}));

  // Outer boundary
  svg.appendChild(se('rect', {x:.75, y:.75, width:FW-1.5, height:FH-1.5,
    fill:'none', stroke:'#1b3450', 'stroke-width':1.5}));

  // Hallway walls with door gaps + door arcs
  [HY, HB].forEach(wy => {
    WSEG.forEach(([x1,x2]) =>
      svg.appendChild(se('line', {x1, y1:wy, x2, y2:wy, stroke:'#172b40', 'stroke-width':1.5})));
    DX.forEach(cx =>
      svg.appendChild(se('path', {
        d:`M${cx-14},${wy} A14,14 0 0,${wy===HY?0:1} ${cx+14},${wy}`,
        fill:'none', stroke:'#22394f', 'stroke-width':1,
      })));
  });

  // Vertical room dividers
  [162, 310, 498].forEach(x => {
    svg.appendChild(se('line', {x1:x, y1:0,  x2:x, y2:HY,  stroke:'#172b40', 'stroke-width':1.5}));
    svg.appendChild(se('line', {x1:x, y1:HB, x2:x, y2:FH,  stroke:'#172b40', 'stroke-width':1.5}));
  });

  // Room labels
  ROOMS.filter(r => r.id !== 'hall').forEach(r => {
    const t = se('text', {x:r.x+r.w/2, y:r.y+r.h*.64,
      fill:'#22394f', 'font-size':11, 'text-anchor':'middle', 'font-weight':500});
    t.textContent = r.label;
    svg.appendChild(t);
  });

  // Corridor label
  const cl = se('text', {x:FW/2, y:HY+HH/2+1,
    fill:'#162535', 'font-size':10, 'text-anchor':'middle', 'dominant-baseline':'middle',
    'letter-spacing':5, 'font-weight':700});
  cl.textContent = 'CORRIDOR';
  svg.appendChild(cl);

  // Hub icons
  HUBS.forEach(h => {
    const g = se('g', {transform:`translate(${h.x},${h.y})`});
    g.appendChild(se('path', {d:`M-7,-13 A9,9 0 0,1 7,-13`,  fill:'none', stroke:'#192d44', 'stroke-width':1.5}));
    g.appendChild(se('path', {d:`M-4,-10 A5,5 0 0,1 4,-10`, fill:'none', stroke:'#192d44', 'stroke-width':1.5}));
    g.appendChild(se('rect', {x:-8, y:-8, width:16, height:16, rx:3, fill:'#05101c', stroke:'#192d44', 'stroke-width':1.2}));
    const id = se('text', {x:0, y:1, fill:'#192d44', 'font-size':9, 'text-anchor':'middle',
      'dominant-baseline':'middle', 'font-weight':700}); id.textContent = h.id; g.appendChild(id);
    const lb = se('text', {x:0, y:22, fill:'#192d44', 'font-size':8, 'text-anchor':'middle'});
    lb.textContent = h.label; g.appendChild(lb);
    svg.appendChild(g);
  });

  return fills;
}

// ════════════════════════════════════════════════════════════════════════════
// Init: build all SVG elements once, store refs for per-frame updates
// ════════════════════════════════════════════════════════════════════════════

const refs = {};

function initFP() {
  const fp = document.getElementById('fp');
  refs.zoneFills = buildBase(fp);

  const dg = se('g'); fp.appendChild(dg);

  // Hub pulse rings (3 per hub)
  refs.pulses = HUBS.flatMap(h =>
    [0,1,2].map(() => {
      const c = se('circle', {cx:h.x, cy:h.y, r:0, fill:'none', stroke:'#1c6fb0', 'stroke-width':.8, opacity:0});
      dg.appendChild(c); return c;
    }));

  // RSSI lines
  refs.rlines = HUBS.map(() => { const l = se('line', {opacity:0}); dg.appendChild(l); return l; });

  // Trail
  refs.trail = Array.from({length:26}, () => { const c = se('circle', {r:3, opacity:0}); dg.appendChild(c); return c; });

  // Device glow + dot
  refs.glow = se('circle', {r:15, 'fill-opacity':.15}); dg.appendChild(refs.glow);
  refs.dot  = se('circle', {r:8, stroke:'white', 'stroke-width':2});  dg.appendChild(refs.dot);

  // Zone badge
  refs.br = se('rect',  {width:52, height:17, rx:8, opacity:.9}); dg.appendChild(refs.br);
  refs.bt = se('text',  {fill:'white', 'font-size':9, 'text-anchor':'middle',
    'dominant-baseline':'middle', 'font-weight':700});               dg.appendChild(refs.bt);

  // Zone history strip (stage 2)
  refs.hist = Array.from({length:30}, (_, i) => {
    const r = se('rect', {width:16, height:14, rx:2, y:FH-22, x:FW-26-i*20, opacity:0});
    dg.appendChild(r); return r;
  });
  refs.hl1 = se('text', {'font-size':8, 'text-anchor':'end',    fill:'#152535', x:FW-26-30*20-4, y:FH-13, opacity:0});
  refs.hl1.textContent = '← zone history'; dg.appendChild(refs.hl1);
  refs.hl2 = se('text', {'font-size':8, 'text-anchor':'middle', fill:'#152535', x:FW-18, y:FH-13, opacity:0});
  refs.hl2.textContent = 'now'; dg.appendChild(refs.hl2);
}

function initMFP() {
  const mfp = document.getElementById('mfp');
  refs.mzf = buildBase(mfp);
  const dg = se('g'); mfp.appendChild(dg);
  refs.mab = ROOMS.map(r => {
    const b = se('rect', {x:r.x+1.5, y:r.y+1.5, width:r.w-3, height:r.h-3,
      fill:'none', 'stroke-width':2, opacity:0}); dg.appendChild(b); return b;
  });
  refs.mdot = se('circle', {r:8, stroke:'white', 'stroke-width':2}); dg.appendChild(refs.mdot);
}

function initMDS() {
  const mg = document.getElementById('mg');
  mg.appendChild(se('rect', {width:560, height:360, fill:'#08111d'}));
  for (let i=0; i<10; i++) mg.appendChild(se('line', {x1:i*58, y1:0, x2:i*58, y2:360, stroke:'#0c1c2c', 'stroke-width':1}));
  for (let i=0; i<7;  i++) mg.appendChild(se('line', {x1:0, y1:i*60, x2:560, y2:i*60, stroke:'#0c1c2c', 'stroke-width':1}));
  const ax = se('text', {x:280, y:352, fill:'#132534', 'font-size':9, 'text-anchor':'middle'});
  ax.textContent = 'MDS dimension 1 (approx. east–west)'; mg.appendChild(ax);

  refs.medges = MEDGES.map(([a,b,w]) => {
    const l = se('line', {x1:MPOS[a].x, y1:MPOS[a].y, x2:MPOS[b].x, y2:MPOS[b].y,
      stroke:'#0e1e2e', 'stroke-width':w*4, opacity:.4});
    mg.appendChild(l); return l;
  });

  const dg = se('g'); mg.appendChild(dg);
  refs.mnodes = MPOS.map(mp => {
    const z = ZONES[mp.id];
    const pulse = se('circle', {cx:mp.x, cy:mp.y, r:0, fill:'none', stroke:z.color, 'stroke-width':1.5, opacity:0});
    const glow  = se('circle', {cx:mp.x, cy:mp.y, r:28, fill:z.color, 'fill-opacity':0});
    const c     = se('circle', {cx:mp.x, cy:mp.y, r:14, fill:z.color, 'fill-opacity':.18, stroke:z.color, 'stroke-width':.8});
    const nt    = se('text',   {x:mp.x, y:mp.y, fill:'white', 'font-size':10,
      'text-anchor':'middle', 'dominant-baseline':'middle', 'font-weight':700});
    nt.textContent = z.name.replace('Zone ', '');
    const dt    = se('text',   {x:mp.x, y:mp.y+24, fill:z.color, 'font-size':8, 'text-anchor':'middle', opacity:.8});
    dt.textContent = z.desc;
    [pulse,glow,c,nt,dt].forEach(el => dg.appendChild(el));
    return {pulse, glow, c, nt, dt};
  });
}

// ════════════════════════════════════════════════════════════════════════════
// Animation loop
// ════════════════════════════════════════════════════════════════════════════

function frame(now) {
  if (!startTime) startTime = now - msRef;
  ms = msRef = (now - startTime) % CYCLE;

  const pos  = dPos(ms);
  const zone = zoneOf(roomAt(pos.x, pos.y));
  const rv   = HUBS.map(h => ({...h, v: rssiOf(pos.x, pos.y, h.x, h.y)}));
  const ph   = (ms % 2000) / 2000;

  // Noisy position for stage-2 raw view
  const nx = Math.sin(ms*.023)*17 + Math.cos(ms*.037)*10;
  const ny = Math.cos(ms*.031)*13 + Math.sin(ms*.041)*8;
  const dp = (stage===2 && showRaw) ? {x:pos.x+nx, y:pos.y+ny} : pos;
  const dz = (stage===2 && showRaw && Math.sin(ms*.0068)>.62) ? ZONES[(zone.id+2)%6] : zone;

  // Zone fills
  refs.zoneFills.forEach((el, i) => {
    const z = zoneOf(ROOMS[i].id);
    el.setAttribute('fill', z.color);
    el.setAttribute('fill-opacity', z.id===zone.id ? .2 : .06);
  });

  // Hub pulses (stage 1 only)
  refs.pulses.forEach((c, j) => {
    const hi = Math.floor(j/3), off = (j%3)*.33, h = HUBS[hi], n = rn(rv[hi].v);
    if (stage!==1 || n<.08) { c.setAttribute('r',0); c.setAttribute('opacity',0); return; }
    const p = (ph + off) % 1;
    c.setAttribute('r', 9 + p*40*Math.sqrt(n));
    c.setAttribute('opacity', (1-p)*.4*n);
  });

  // RSSI lines (stage 1 only)
  refs.rlines.forEach((l, i) => {
    const h = HUBS[i], n = rn(rv[i].v);
    if (stage!==1 || n<.1) { l.setAttribute('opacity',0); return; }
    sat(l, {x1:pos.x, y1:pos.y, x2:h.x, y2:h.y,
      stroke:`hsl(${Math.round(n*120)},65%,55%)`, 'stroke-width':.5+n*2.5, opacity:.1+n*.5});
  });

  // Trail
  refs.trail.forEach((c, i) => {
    const t = ((ms - i*420) % CYCLE + CYCLE) % CYCLE;
    const p = dPos(t);
    const tx = p.x + (stage===2&&showRaw ? (Math.sin(t*.023)*17+Math.cos(t*.037)*10)*Math.max(0,1-i*.05) : 0);
    const ty = p.y + (stage===2&&showRaw ? (Math.cos(t*.031)*13+Math.sin(t*.041)*8)*Math.max(0,1-i*.05)  : 0);
    sat(c, {cx:tx, cy:ty, fill:zone.color, r:Math.max(1.2,3-i*.08), opacity:(1-i/26)*.5});
  });

  // Device
  sat(refs.glow, {cx:dp.x, cy:dp.y, fill:dz.color});
  sat(refs.dot,  {cx:dp.x, cy:dp.y, fill:dz.color});
  const bx = Math.min(dp.x+12, FW-58), by = Math.max(dp.y-18, 10);
  sat(refs.br, {x:bx, y:by-9, fill:dz.color});
  sat(refs.bt, {x:bx+26, y:by}); refs.bt.textContent = dz.name;

  // History strip (stage 2)
  const sh2 = stage === 2;
  refs.hl1.setAttribute('opacity', sh2?1:0);
  refs.hl2.setAttribute('opacity', sh2?1:0);
  refs.hist.forEach((el, i) => {
    if (!sh2) { el.setAttribute('opacity',0); return; }
    const pm = ((ms-i*700)%CYCLE+CYCLE)%CYCLE;
    const pz = zoneOf(roomAt(...Object.values(dPos(pm))));
    const gl = showRaw && Math.sin(pm*.0068)>.62;
    const dzone = gl ? ZONES[(pz.id+2)%6] : pz;
    el.setAttribute('fill', dzone.color);
    el.setAttribute('opacity', i===0 ? 1 : .15+(1-i/30)*.5);
  });

  // Stage 3 updates
  if (stage===3) {
    const mph = (ms%1800)/1800;
    refs.mzf.forEach((el, i) => {
      const z = zoneOf(ROOMS[i].id), act = z.id===zone.id;
      el.setAttribute('fill', z.color);
      el.setAttribute('fill-opacity', act?.28:.08);
    });
    refs.mab.forEach((el, i) => {
      const z = zoneOf(ROOMS[i].id), act = z.id===zone.id;
      el.setAttribute('stroke', z.color);
      el.setAttribute('opacity', act ? .5+Math.sin(ms*.003)*.3 : 0);
    });
    sat(refs.mdot, {cx:pos.x, cy:pos.y, fill:zone.color});
    refs.mnodes.forEach((n, i) => {
      const z = ZONES[i], act = z.id===zone.id;
      n.c.setAttribute('r',              act ? 20 : 14);
      n.c.setAttribute('fill-opacity',   act ? .85 : .18);
      n.c.setAttribute('stroke-width',   act ? 1.5 : .8);
      n.nt.setAttribute('font-size',     act ? 12 : 10);
      n.glow.setAttribute('fill-opacity', act ? .08 : 0);
      if (act) { n.pulse.setAttribute('r', 22+mph*18); n.pulse.setAttribute('opacity', 1-mph); }
      else      { n.pulse.setAttribute('r', 0);          n.pulse.setAttribute('opacity', 0); }
    });
    refs.medges.forEach((l, i) => {
      const [a,b] = MEDGES[i], act = a===zone.id || b===zone.id;
      l.setAttribute('stroke',  act ? '#1c3855' : '#0e1e2e');
      l.setAttribute('opacity', act ? .7 : .35);
    });
  }

  // Sidebar: zone badge (on zone change)
  if (zone.id !== lastZone) {
    lastZone = zone.id;
    const zb = document.getElementById('zbadge');
    zb.style.background = ca(zone.color, .1);
    zb.style.border = `1px solid ${ca(zone.color, .28)}`;
    document.getElementById('zb-lbl').style.color  = zone.color;
    document.getElementById('zb-name').style.color = zone.color;
    document.getElementById('zb-name').textContent = zone.name;
    document.getElementById('zb-desc').textContent = zone.desc;
    // Zone pills
    document.querySelectorAll('.zp').forEach((p, i) => {
      const z = ZONES[i], act = z.id===zone.id;
      p.style.background = act ? ca(z.color,.12) : '#f9fafb';
      p.style.color      = act ? z.color          : '#9ca3af';
      p.style.border     = `1px solid ${act ? ca(z.color,.3) : '#e5e7eb'}`;
    });
    // Stage 3 zone list
    if (stage===3) {
      document.querySelectorAll('.szrow').forEach(row => {
        const id = parseInt(row.dataset.id);
        const z  = ZONES[id], act = z.id===zone.id;
        row.style.background = act ? ca(z.color,.1) : 'transparent';
        row.style.border     = `1px solid ${act ? ca(z.color,.3) : 'transparent'}`;
        row.querySelector('.szname').style.color = act ? z.color : '#111827';
      });
    }
  }

  // Sidebar: RSSI bars (stage 1, throttled to ~10fps)
  if (stage===1 && ms-lastRssiT > 95) {
    lastRssiT = ms;
    rv.forEach(h => {
      const n=rn(h.v), hue=Math.round(n*120), col=`hsl(${hue},60%,42%)`;
      const bar = document.getElementById('rb-'+h.id);
      const val = document.getElementById('rv-'+h.id);
      if (bar) { bar.style.width = n*100+'%'; bar.style.background = col; }
      if (val) { val.textContent = h.v+' dBm'; val.style.color = col; }
    });
  }

  if (playing) rafId = requestAnimationFrame(frame);
}

// ════════════════════════════════════════════════════════════════════════════
// UI: stage switching
// ════════════════════════════════════════════════════════════════════════════

function setStage(n) {
  stage = n;
  document.querySelectorAll('.tab').forEach((t, i) => {
    const act = i+1===n;
    t.classList.toggle('active', act);
  });
  document.getElementById('fp-wrap').style.display  = n<3 ? 'block' : 'none';
  document.getElementById('mds-wrap').style.display = n===3 ? 'flex' : 'none';
  document.getElementById('sc').innerHTML = getSC(n);
  document.getElementById('bmark').innerHTML =
    `<span style="color:#16a34a;font-weight:500">${BMKS[n-1]}</span> · Kiarashi et al. 2023`;
  document.getElementById('sind').textContent = `Stage ${n} / 3 · Pipeline active`;
  lastZone = -1; // force badge refresh
  // Re-wire stage-2 toggle buttons
  if (n===2) {
    document.getElementById('rawbtn')?.addEventListener('click',  () => setRaw(true));
    document.getElementById('smthbtn')?.addEventListener('click', () => setRaw(false));
    updateRawButtons();
  }
}

function setRaw(v) {
  showRaw = v;
  updateRawButtons();
  const desc = document.getElementById('s2desc');
  if (desc) desc.textContent = v
    ? 'Independent zone assignment per timestep — RSSI noise causes apparent zone jumps.'
    : 'Viterbi decodes the most likely sequence using learned transition dynamics.';
}

function updateRawButtons() {
  const rb = document.getElementById('rawbtn'), sb = document.getElementById('smthbtn');
  if (!rb || !sb) return;
  rb.className = 'mode-btn' + (showRaw  ? ' raw-active'    : '');
  sb.className = 'mode-btn' + (!showRaw ? ' smooth-active' : '');
}

function togglePlay() {
  playing = !playing;
  document.getElementById('playbtn').textContent = playing ? '⏸' : '▶';
  if (playing) { startTime = performance.now() - msRef; rafId = requestAnimationFrame(frame); }
}

// ════════════════════════════════════════════════════════════════════════════
// Sidebar content templates
// ════════════════════════════════════════════════════════════════════════════

function getSC(n) {
  if (n===1) return `
    <div class="sc-lbl">Algorithm</div>
    <div class="sc-card">
      <div class="sc-card-title">k-means clustering (k=6)</div>
      Groups similar RSSI vectors into implicit zones. No labels or floor plan required.
    </div>
    <div class="sc-lbl">Live RSSI vector</div>
    ${HUBS.map(h => `
      <div style="margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="color:#4b5563">${h.label}</span>
          <span id="rv-${h.id}" style="font-family:monospace;font-weight:500;font-size:11px">-- dBm</span>
        </div>
        <div style="height:4px;background:#f3f4f6;border-radius:2px;border:1px solid #e5e7eb">
          <div id="rb-${h.id}" style="height:100%;width:0;border-radius:2px;transition:width .1s"></div>
        </div>
      </div>`).join('')}
    <div class="sc-card">
      Benchmark: <span style="color:#16a34a">94–99%</span> zone-level accuracy
      — Mallik et al., Eng. AI 2023
    </div>`;

  if (n===2) return `
    <div class="sc-lbl">View mode</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button id="rawbtn"  class="mode-btn raw-active">Raw clusters</button>
      <button id="smthbtn" class="mode-btn">HMM decoded</button>
    </div>
    <div class="sc-card">
      <span id="s2desc">Independent zone assignment per timestep — RSSI noise causes apparent zone jumps.</span>
    </div>
    <div class="sc-card">
      <div class="sc-card-title">Hidden Markov Model</div>
      Hidden states = zones · Emissions = RSSI distributions · Transition matrix learned from data
    </div>
    <div class="sc-card">
      Reference: <span style="color:#16a34a">Alshamaa et al., IEEE SAS 2019</span><br>
      BLE trajectory tracking in clinical setting
    </div>`;

  return `
    <div class="sc-card">
      Derives spatial structure from pairwise RSSI dissimilarity — no floor plan or anchor coordinates required.
    </div>
    <div class="sc-lbl">Discovered zones</div>
    ${ZONES.map(z => `
      <div class="szrow" data-id="${z.id}">
        <div class="szdot" style="background:${z.color}"></div>
        <div>
          <div class="szname">${z.name}</div>
          <div class="szdesc">${z.desc}</div>
        </div>
      </div>`).join('')}
    <div class="sc-card" style="margin-top:10px">
      Output is topological, not metric — distances are approximate.<br>
      <span style="color:#4b5563">Shang et al. 2003 · Miao et al. RI-MDS 2015</span>
    </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
// Bootstrap
// ════════════════════════════════════════════════════════════════════════════

(function init() {
  // Build tab bar
  const tc = document.getElementById('tabs');
  TABS.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.n===1 ? ' active' : '');
    btn.onclick   = () => setStage(t.n);
    btn.innerHTML = `<div class="tname">Stage ${t.n} · ${t.name}</div>
                     <div class="tsub">${t.sub}</div>`;
    tc.appendChild(btn);
  });

  // Build zone pills
  const zpc = document.getElementById('zpills');
  ZONES.forEach(z => {
    const p = document.createElement('div');
    p.className = 'zp';
    p.textContent = z.name;
    zpc.appendChild(p);
  });

  // Build SVGs
  initFP();
  initMFP();
  initMDS();

  // Initial stage content + benchmark
  setStage(1);

  // Start animation
  rafId = requestAnimationFrame(frame);
})();
</script>
</body>
</html>
