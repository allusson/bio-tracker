<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BLE Coverage Sandbox</title>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>

<!-- ── Toolbar ──────────────────────────────────────────────────── -->
<div id="toolbar">
  <span class="brand">BLE&nbsp;<em>Coverage</em>&nbsp;Sandbox</span>
  <div class="vsep"></div>

  <button class="mbtn on"     data-mode="add-hub"    title="Shortcut: H">Add Hub</button>
  <button class="mbtn"        data-mode="add-device" title="Shortcut: D">Add Device</button>
  <button class="mbtn"        data-mode="add-wall"   title="Shortcut: W">Add Wall</button>
  <button class="mbtn"        data-mode="select"     title="Shortcut: S">Select / Move</button>
  <button class="mbtn danger" data-mode="delete"     title="Shortcut: X">Delete</button>

  <div class="vsep"></div>
  <span class="clbl">Radius&thinsp;<span id="rval">150</span>&thinsp;px</span>
  <input type="range" id="rslider" min="40" max="420" value="150" step="5"/>

  <div class="vsep"></div>
  <div class="ckwrap">
    <input type="checkbox" id="ringck" checked/>
    <label for="ringck">Signal rings</label>
  </div>

  <div class="vsep"></div>
  <button class="mbtn" id="computeZonesbtn">Compute Zones</button>
  <button class="mbtn" id="clearZonesbtn" style="display:none">Clear Zones</button>

  <button id="clearbtn">Clear All</button>
</div>

<!-- ── Canvas ───────────────────────────────────────────────────── -->
<canvas id="canvas"></canvas>

<!-- ── Tooltip ──────────────────────────────────────────────────── -->
<div id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-xy"   id="tt-xy"></div>
  <div class="tt-sep"></div>
  <div class="tt-hint">Drag to move &middot; Del to remove</div>
</div>

<!-- ── Key hints ────────────────────────────────────────────────── -->
<div id="keyhints">
  <span class="kh"><b>H</b> Add Hub</span>
  <span class="kh"><b>D</b> Add Device</span>
  <span class="kh"><b>W</b> Add Wall</span>
  <span class="kh"><b>S</b> Select</span>
  <span class="kh"><b>X</b> Delete</span>
  <span class="kh"><b>Esc</b> Cancel / Deselect</span>
  <span class="kh"><b>Del</b> Remove selected</span>
  <span class="kh"><b>Right-click</b> Cancel wall</span>
</div>

<script src="js/state.js"></script>
<script src="js/rssi.js"></script>
<script src="js/zones.js"></script>
<script src="js/canvas.js"></script>
<script src="js/tools.js"></script>
<script src="js/ui.js"></script>
</body>
</html>
